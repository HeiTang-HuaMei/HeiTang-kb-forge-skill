name: Docs Check

on:
  pull_request:
    paths:
      - "docs/**"
      - "README.md"
      - "README.zh-CN.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "ROADMAP.md"
      - ".github/**"
  workflow_dispatch:

jobs:
  docs-boundary:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Docs truth tests
        run: |
          python -m pytest -m docs_truth
      - name: Product baseline pointers
        run: |
          if (!(Test-Path docs/current/CURRENT_PRODUCT_BASELINE.md)) { exit 1 }
          if (!(Test-Path docs/product/PRODUCT_ARCHITECTURE.md)) { exit 1 }
          if (!(Test-Path docs/product/PRD.md)) { exit 1 }
          if (!(Test-Path docs/product/FEATURE_ACCEPTANCE_MATRIX.md)) { exit 1 }
