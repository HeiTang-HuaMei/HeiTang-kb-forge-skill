name: Nightly Full Gate

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  full-python:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Full pytest
        run: |
          python -m pytest
      - name: Quickstart smoke
        run: |
          python -m heitang_kb_forge.cli build --input ./examples/quickstart/input --output ./tmp_quickstart_output
          if (!(Test-Path ./tmp_quickstart_output/manifest.json)) { exit 1 }
          if (!(Test-Path ./tmp_quickstart_output/chunks.jsonl)) { exit 1 }
