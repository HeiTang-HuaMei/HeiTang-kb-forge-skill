name: RC Candidate Gate

on:
  workflow_dispatch:

jobs:
  rc-candidate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Tests
        run: |
          python -m pytest
      - name: Release readiness dry run
        run: |
          python -m heitang_kb_forge.cli release-readiness --workspace . --output ./tmp_release_readiness
      - name: RC boundary check
        run: |
          if (Test-Path ./web/workbench/flutter_app/output) {
            Write-Output "Runtime output directory exists in checkout scope; do not commit generated output."
          }
