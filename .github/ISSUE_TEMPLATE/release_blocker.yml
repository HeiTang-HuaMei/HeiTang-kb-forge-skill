name: Release Blocker
description: Track a blocker that prevents RC or stable release.
title: "[Release Blocker]: "
labels: ["release-blocker"]
body:
  - type: textarea
    id: blocker
    attributes:
      label: Blocker
    validations:
      required: true
  - type: textarea
    id: gate
    attributes:
      label: Failed Gate
      description: PR fast, nightly full, RC candidate, release gate, Owner retest, security, docs.
  - type: textarea
    id: resolution
    attributes:
      label: Required Resolution
  - type: textarea
    id: evidence
    attributes:
      label: Evidence To Close
