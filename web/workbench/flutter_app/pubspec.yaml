name: heitang_workbench
description: Contract-driven HeiTang Knowledge Workbench Flutter scaffold.
publish_to: "none"
version: 4.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/black_cat_head.svg
    - assets/brand/black_tiger_head.svg
    - assets/contracts/p1_core_contract_fixture.json
    - assets/workflows/p1_real_workflow_v1_evidence.json
    - assets/workflows/p1_real_workflow_v2_evidence.json
    - assets/workflows/p1_real_workflow_v2/full_ready_action_execution_matrix.json
    - assets/workflows/p1_real_workflow_v2/action_execution_result_index.json
    - assets/workflows/p1_real_workflow_v2/action_artifact_assertion_report.json
    - assets/workflows/p1_real_workflow_v2/action_report_assertion_report.json
    - assets/workflows/p1_real_workflow_v2/action_error_boundary_report.json
    - assets/workflows/p1_real_workflow_v2/full_local_user_path_closure_report.json
    - assets/workflows/p1_real_workflow_v2/p1_real_workflow_v2_report.json
    - assets/workflows/p1_real_workflow_v2/remaining_blockers.json
    - assets/workflows/p1_final_gate_rerun/
    - assets/external/external_capability_registry.json
    - assets/external/s_a_contract_inclusion_matrix.json
