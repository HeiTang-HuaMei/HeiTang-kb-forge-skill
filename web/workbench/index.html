<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111111" />
    <title>HeiTang Knowledge Workbench</title>
    <link rel="icon" href="data:," />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-theme="light">
    <div class="workbench-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <div class="brand-mascots" aria-label="HeiTang black cat and black tiger brand marks">
            <img src="./flutter_app/assets/brand/black_cat_head.svg" alt="黑猫头" />
            <img src="./flutter_app/assets/brand/black_tiger_head.svg" alt="黑虎头" />
          </div>
          <div>
            <p class="brand-name">黑糖 HeiTang</p>
            <p class="eyebrow" data-i18n="product.kicker">Mock-only UI Prototype</p>
            <h1 data-i18n="product.title">HeiTang Knowledge Workbench</h1>
          </div>
        </div>
        <div class="toolbar" aria-label="Workbench controls">
          <button class="icon-button" id="theme-toggle" type="button" aria-label="Toggle theme">◐</button>
          <div class="segmented" aria-label="Language">
            <button class="segment is-active" type="button" data-locale="zh-CN">中</button>
            <button class="segment" type="button" data-locale="en-US">EN</button>
          </div>
        </div>
      </header>

      <nav class="mobile-nav" aria-label="Mobile page navigation">
        <select id="mobile-page-select" aria-label="Page"></select>
      </nav>

      <div class="layout">
        <aside class="sidebar" aria-label="Workbench navigation">
          <div class="sidebar-brand">KB Forge</div>
          <div class="nav-list" id="nav-list"></div>
        </aside>

        <main class="content" id="app-root" data-testid="workbench-app" tabindex="-1"></main>
      </div>
    </div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
